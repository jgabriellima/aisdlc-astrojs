apiVersion: ai-sdlc.io/v1alpha1
kind: Pipeline
metadata:
  name: default
spec:
  # Agent runner: Cursor (see .env.example, scripts/ai-sdlc-cli.mjs)
  triggers:
    - event: issue.labeled
      filter:
        labels:
          - ai-eligible
  providers:
    sourceControl:
      type: github
      config:
        org: jgabriellima
  stages:
    - name: validate
      qualityGates:
        - default-gates
    - name: code
      agent: default-agent
      timeout: PT30M
      onFailure:
        strategy: retry
        maxRetries: 2
    - name: review
      qualityGates:
        - default-gates
  # backlog: holds settings specific to the backlog-task (/ai-sdlc execute)
  # workflow. These were formerly in a separate pipeline-backlog.yaml file
  # (deprecated by AISDLC-245.5). Slash commands + pipeline-cli readers
  # prefer this canonical location.
  backlog:
    branching:
      pattern: 'ai-sdlc/{issueIdLower}-{slug}'
      targetBranch: main
      cleanup: on-merge
    pullRequest:
      titleTemplate: 'feat: {issueTitle} ({issueId})'
      descriptionSections:
        - summary
        - changes
        - closes
      includeProvenance: true
      closeKeyword: References
